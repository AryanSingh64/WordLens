<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordLens — Vault</title>
    <link rel="stylesheet" href="popup.css">
    <style>
        /* Popup-specific styles */
        body {
            width: 360px;
            min-height: 400px;
            margin: 0;
            padding: 0;
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .wl-popup-header {
            padding: 20px;
            background: linear-gradient(135deg, #f7f5f0 0%, #f0ede5 100%);
            border-bottom: 1px solid rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .wl-popup-title {
            margin: 0;
            font-family: 'Instrument Serif', serif;
            font-size: 24px;
            font-weight: 500;
            font-style: italic;
            color: #1a1a1a;
        }

        .wl-popup-subtitle {
            margin: 4px 0 0;
            font-size: 12px;
            color: #6b6b6b;
        }

        .wl-popup-actions {
            display: flex;
            gap: 8px;
        }

        .wl-popup-action-btn {
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.3);
            color: #16a34a;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .wl-popup-action-btn:hover {
            background: rgba(74, 222, 128, 0.2);
            border-color: #4ade80;
        }

        .wl-popup-clear {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #dc2626;
        }

        .wl-popup-clear:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
        }

        .wl-popup-content {
            padding: 16px;
            max-height: 500px;
            overflow-y: auto;
        }

        .wl-vault-item {
            background: rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            transition: all 0.2s ease;
        }

        .wl-vault-item:hover {
            background: rgba(74, 222, 128, 0.05);
            border-color: rgba(74, 222, 128, 0.3);
        }

        .wl-vault-word {
            margin: 0 0 4px;
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .wl-vault-context {
            margin: 0;
            font-size: 13px;
            color: #6b6b6b;
            line-height: 1.4;
        }

        .wl-vault-date {
            margin: 6px 0 0;
            font-size: 11px;
            color: #9ca3af;
        }

        .wl-vault-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .wl-vault-btn-sm {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid rgba(0,0,0,0.1);
            background: transparent;
            color: #6b6b6b;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .wl-vault-btn-sm:hover {
            border-color: #4ade80;
            color: #16a34a;
        }

        .wl-vault-empty {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }

        .wl-vault-empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .wl-vault-empty-text {
            font-size: 14px;
        }

        .wl-divider {
            border: none;
            border-top: 1px solid rgba(0,0,0,0.08);
            margin: 16px 0;
        }

        .wl-popup-footer {
            padding: 12px 16px;
            background: #f7f5f0;
            border-top: 1px solid rgba(0,0,0,0.08);
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .wl-footer-link {
            background: none;
            border: none;
            color: #6b6b6b;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .wl-footer-link:hover {
            background: rgba(0,0,0,0.05);
            color: #1a1a1a;
        }

        .wl-error-banner {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 13px;
        }

        .wl-loading {
            text-align: center;
            padding: 40px 20px;
            color: #6b6b6b;
        }

        /* Skeleton loading */
        .wl-skeleton {
            background: linear-gradient(90deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.05) 100%);
            background-size: 200% 100%;
            animation: wl-skeleton-pulse 1.5s infinite ease-in-out;
            border-radius: 4px;
            height: 40px;
            margin-bottom: 10px;
        }

        @keyframes wl-skeleton-pulse {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    <div class="wl-popup-header">
        <div>
            <h1 class="wl-popup-title">wordlens</h1>
            <p class="wl-popup-subtitle">Vocabulary vault</p>
        </div>
        <div class="wl-popup-actions">
            <button class="wl-popup-action-btn" id="wl-btn-settings">Settings</button>
        </div>
    </div>

    <div class="wl-popup-content" id="wl-vault-content">
        <div class="wl-loading">
            <div class="wl-skeleton"></div>
            <div class="wl-skeleton"></div>
            <div class="wl-skeleton"></div>
        </div>
    </div>

    <div class="wl-popup-footer">
        <button class="wl-footer-link" id="wl-link-open-sidepanel">Open Side Panel</button>
        <button class="wl-footer-link" id="wl-link-pdf">PDF Reader</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
